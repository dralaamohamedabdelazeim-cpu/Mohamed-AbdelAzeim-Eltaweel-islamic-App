name: SimpleBuild
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Quick Build
      run: |
        # إنشاء مشروع أندرويد "حرفياً" في ثواني
        mkdir -p app/src/main/java/com/abdelazim/islamicapp
        mkdir -p app/src/main/res/values
        echo '<resources><string name="app_name">صدقة جارية</string></resources>' > app/src/main/res/values/strings.xml
        echo "include ':app'" > settings.gradle
        cat <<EOF > build.gradle
        buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.0' } }
        allprojects { repositories { google(); mavenCentral() } }
        EOF
        cat <<EOF > app/build.gradle
        plugins { id 'com.android.application' }
        android { namespace 'com.abdelazim.islamicapp'; compileSdk 33
            defaultConfig { applicationId "com.abdelazim.islamicapp"; minSdk 21; targetSdk 33; versionCode 1; versionName "1.0" }
        }
        EOF
        # أمر بناء APK مباشر وصريح
        chmod +x gradlew || sudo apt-get install -y gradle
        gradle assembleDebug
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Final-App
        path: "**/build/outputs/apk/debug/*.apk"
